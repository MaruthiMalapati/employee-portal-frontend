<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login & Logout Time</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

<style>
body {
  margin: 0;
  min-height: 100vh;
  font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
}

.wrapper {
  width: 100%;
  max-width: 820px;
  padding: 20px;
}

.time-card {
  background: linear-gradient(160deg, #315f86, #467eb1);
  color: #fff;
  border-radius: 22px;
  padding: 26px 22px 24px;
  text-align: center;
  box-shadow: 0 18px 45px rgba(0,0,0,0.18);
  position: relative;
  overflow: hidden;
}

.time-card::after {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at top right, rgba(255,255,255,0.25), transparent 60%);
  pointer-events: none;
}

.time-title {
  font-size: 0.85rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  opacity: 0.9;
}

.time-value {
  font-size: 1.65rem;
  font-weight: 700;
  margin: 8px 0 4px;
}

.day-text {
  font-size: 0.9rem;
  opacity: 0.85;
  margin-bottom: 14px;
}

.time-card button {
  border-radius: 999px;
  padding: 6px 28px;
  font-size: 0.9rem;
  font-weight: 500;
}

.status-text {
  margin-top: 26px;
  text-align: center;
  font-size: 1.05rem;
  color: #2f2f2f;
}

@media (max-width: 576px) {
  .time-value {
    font-size: 1.45rem;
  }
}
</style>
</head>

<body>

<div class="wrapper">
  <div class="row g-4 justify-content-center">
    <div class="col-12">
      <div id="sessionStatus" class="alert alert-light border small mb-0">
        Loading session status...
      </div>
    </div>

    <div class="col-12 col-md-6">
      <div class="time-card">
        <div class="time-title">Today Login</div>
        <div class="time-value" id="loginTime">--:--</div>
        <div class="day-text" id="loginDay">No login recorded today</div>
        <button class="btn btn-light btn-sm" disabled>Login Tracked</button>
      </div>
    </div>

    <div class="col-12 col-md-6">
      <div class="time-card">
        <div class="time-title">Today Logout</div>
        <div class="time-value" id="logoutTime">--:--</div>
        <div class="day-text" id="logoutDay">Auto logout at 6:30 PM IST</div>
        <button class="btn btn-outline-light btn-sm" id="btnLogout">
          Logout
        </button>
      </div>
    </div>

    <div class="col-12">
      <div class="alert alert-info border-0 shadow-sm mb-0 text-center">
        Total working hours today:
        <strong id="workingHours">0.00 hrs</strong>
      </div>
    </div>
  </div>

  <div class="status-text" id="statusMessage"></div>
</div>

<script src="js/config.js"></script>
<script>
const loginTimeEl = document.getElementById("loginTime");
const loginDayEl = document.getElementById("loginDay");
const logoutTimeEl = document.getElementById("logoutTime");
const logoutDayEl = document.getElementById("logoutDay");
const statusMessageEl = document.getElementById("statusMessage");
const workingHoursEl = document.getElementById("workingHours");
const btnLogout = document.getElementById("btnLogout");
const sessionStatusEl = document.getElementById("sessionStatus");

function formatISTTime(dateValue) {
  return new Date(dateValue).toLocaleTimeString("en-IN", {
    timeZone: "Asia/Kolkata",
    hour: "2-digit",
    minute: "2-digit",
    hour12: true
  });
}

function formatISTDate(dateValue) {
  return new Date(dateValue).toLocaleDateString("en-IN", {
    timeZone: "Asia/Kolkata",
    weekday: "long",
    day: "2-digit",
    month: "short"
  });
}

function setDefaultState(message) {
  sessionStatusEl.textContent = message;
  loginTimeEl.textContent = "--:--";
  loginDayEl.textContent = "No login recorded today";
  logoutTimeEl.textContent = "--:--";
  logoutDayEl.textContent = "Auto logout at 6:30 PM IST";
  workingHoursEl.textContent = "0.00 hrs";
  btnLogout.disabled = true;
}

async function loadSessionStatus() {
  const token = localStorage.getItem("authToken");
  if (!token) {
    setDefaultState("Login required.");
    return;
  }

  statusMessageEl.textContent = "";

  try {
    const res = await fetch(`${API_BASE_URL}/api/login/employee-session-status`, {
      headers: {
        Authorization: "Bearer " + token
      }
    });

    const result = await res.json();
    const attendance = result.attendance || null;
    const session = result.session || null;

    if (!res.ok || !result.success || !attendance) {
      setDefaultState("No login record found for today.");
      return;
    }

    if (attendance.first_login_time) {
      loginTimeEl.textContent = formatISTTime(attendance.first_login_time);
      loginDayEl.textContent = formatISTDate(attendance.first_login_time);
    }

    workingHoursEl.textContent = `${attendance.working_hours || "0.00"} hrs`;

    if (session && !session.logout_time) {
      sessionStatusEl.innerHTML = `
        <strong>Logged in at ${formatISTTime(session.login_time)}</strong><br>
        Auto logout at <strong>6:30 PM IST</strong>
      `;
      logoutTimeEl.textContent = "--:--";
      logoutDayEl.textContent = "Auto logout at 6:30 PM IST";
      btnLogout.disabled = false;
      return;
    }

    const logoutSource = attendance.last_logout_time || (session && session.logout_time);
    const logoutType = (session && session.logout_type) || "manual";

    if (logoutSource) {
      sessionStatusEl.innerHTML = `
        <strong>Logged out at ${formatISTTime(logoutSource)}</strong>
        <small class="text-muted">(${logoutType})</small>
      `;
      logoutTimeEl.textContent = formatISTTime(logoutSource);
      logoutDayEl.textContent = formatISTDate(logoutSource);
    } else {
      sessionStatusEl.textContent = "No active session";
      logoutTimeEl.textContent = "--:--";
      logoutDayEl.textContent = "No logout recorded";
    }

    btnLogout.disabled = true;
  } catch (err) {
    console.error(err);
    setDefaultState("Unable to load session status.");
  }
}

btnLogout.addEventListener("click", async () => {
  const token = localStorage.getItem("authToken");
  if (!token) return;

  btnLogout.disabled = true;
  statusMessageEl.textContent = "Logging you out...";

  try {
    const res = await fetch(`${API_BASE_URL}/api/login/logout`, {
      method: "POST",
      headers: {
        Authorization: "Bearer " + token,
        "Content-Type": "application/json"
      }
    });

    const result = await res.json();
    if (!res.ok || !result.success) {
      throw new Error(result.message || "Logout failed");
    }

    statusMessageEl.textContent = "Logout successful. Working hours have been updated.";
    await loadSessionStatus();
  } catch (err) {
    console.error(err);
    statusMessageEl.textContent = "Unable to logout right now.";
    btnLogout.disabled = false;
  }
});

document.addEventListener("DOMContentLoaded", loadSessionStatus);
</script>

</body>
</html>
