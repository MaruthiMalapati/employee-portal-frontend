<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Daily Tasks</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />

  <style>
    body {
      margin: 0;
      background: #f4f7fb;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      color: #18324a;
    }

    .page-shell {
      max-width: 1180px;
      margin: 0 auto;
      padding: 28px 18px 40px;
    }

    .hero-card {
      background: linear-gradient(135deg, #2f5f88, #477cab);
      color: #fff;
      border-radius: 24px;
      padding: 26px 24px;
      box-shadow: 0 18px 40px rgba(47, 95, 136, 0.18);
      margin-bottom: 22px;
    }

    .hero-card h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.45rem;
    }

    .hero-card p {
      margin: 0;
      opacity: 0.9;
      max-width: 760px;
    }

    .panel-card {
      background: #fff;
      border-radius: 20px;
      border: 1px solid #e4ecf3;
      box-shadow: 0 10px 28px rgba(18, 46, 74, 0.06);
      padding: 22px;
      height: 100%;
    }

    .panel-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .panel-title h2 {
      font-size: 1.05rem;
      margin: 0;
      font-weight: 700;
      color: #224566;
    }

    .form-label {
      font-size: 0.9rem;
      font-weight: 600;
      color: #274868;
    }

    .form-control,
    .form-select {
      border-radius: 12px;
      border-color: #ccd9e6;
      min-height: 44px;
    }

    textarea.form-control {
      min-height: 110px;
    }

    .btn-brand {
      background: #2f5f88;
      color: #fff;
      border: none;
      border-radius: 999px;
      padding: 10px 22px;
      font-weight: 600;
    }

    .btn-brand:hover {
      background: #244c6d;
      color: #fff;
    }

    .btn-soft {
      border-radius: 999px;
      font-weight: 600;
      padding: 10px 18px;
    }

    .task-status {
      display: inline-flex;
      align-items: center;
      padding: 0.35rem 0.75rem;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 700;
    }

    .task-status.Pending {
      background: #fff4d8;
      color: #9f6a00;
    }

    .task-status.In-Progress {
      background: #e1f0ff;
      color: #1f5e9f;
    }

    .task-status.Completed {
      background: #dff5e7;
      color: #18704b;
    }

    .task-status.Blocked {
      background: #ffe0e0;
      color: #a12b2b;
    }

    .task-table th {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #5f7690;
      border-bottom-width: 1px;
    }

    .task-table td {
      vertical-align: middle;
      font-size: 0.92rem;
    }

    .task-table tbody tr:hover {
      background: #f7fbff;
    }

    .muted-note {
      color: #6d8094;
      font-size: 0.88rem;
    }

    .empty-state {
      padding: 28px 14px;
      text-align: center;
      color: #71859b;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 768px) {
      .page-shell {
        padding: 18px 12px 28px;
      }

      .hero-card,
      .panel-card {
        border-radius: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <section class="hero-card">
      <h1 id="heroTitle">Daily Tasks</h1>
      <p id="heroText">
        Add today's work, keep task status updated through the day, and review what has already been completed.
      </p>
    </section>

    <div class="row g-4">
      <div class="col-lg-4" id="taskFormColumn">
        <div class="panel-card">
          <div class="panel-title">
            <h2 id="formTitle">Add Daily Task</h2>
            <button class="btn btn-outline-secondary btn-sm btn-soft hidden" id="cancelEditBtn" type="button">
              Cancel Edit
            </button>
          </div>

          <form id="taskForm">
            <div class="mb-3">
              <label class="form-label" for="taskDate">Task Date</label>
              <input type="date" id="taskDate" class="form-control" required />
            </div>

            <div class="mb-3">
              <label class="form-label" for="taskTitle">Task Title</label>
              <input type="text" id="taskTitle" class="form-control" placeholder="Ex: API integration for attendance screen" required />
            </div>

            <div class="mb-3">
              <label class="form-label" for="taskDescription">Task Description</label>
              <textarea id="taskDescription" class="form-control" placeholder="Briefly describe the task, blockers, or expected outcome"></textarea>
            </div>

            <div class="mb-4">
              <label class="form-label" for="taskStatus">Status</label>
              <select id="taskStatus" class="form-select">
                <option value="Pending">Pending</option>
                <option value="In Progress">In Progress</option>
                <option value="Completed">Completed</option>
                <option value="Blocked">Blocked</option>
              </select>
            </div>

            <div class="d-grid gap-2">
              <button class="btn btn-brand" type="submit" id="submitBtn">Save Task</button>
            </div>
          </form>
        </div>
      </div>

      <div class="col-lg-8">
        <div class="panel-card">
          <div class="panel-title">
            <h2 id="listTitle">Today's Tasks</h2>
            <span class="badge text-bg-light border" id="taskCountBadge">0 tasks</span>
          </div>

          <div class="row g-3 mb-3" id="filterRow">
            <div class="col-md-4">
              <label class="form-label" for="filterDate">View Date</label>
              <input type="date" id="filterDate" class="form-control" />
            </div>
            <div class="col-md-4 hidden" id="employeeFilterWrap">
              <label class="form-label" for="employeeFilter">Employee</label>
              <select id="employeeFilter" class="form-select">
                <option value="">All Employees</option>
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label" for="statusFilter">Status</label>
              <select id="statusFilter" class="form-select">
                <option value="">All Statuses</option>
                <option value="Pending">Pending</option>
                <option value="In Progress">In Progress</option>
                <option value="Completed">Completed</option>
                <option value="Blocked">Blocked</option>
              </select>
            </div>
          </div>

          <div class="d-flex justify-content-between align-items-center mb-3">
            <div class="muted-note" id="listDescription">
              Track your tasks for the selected date and update them whenever the status changes.
            </div>
            <button class="btn btn-outline-primary btn-soft" type="button" id="refreshBtn">
              Refresh
            </button>
          </div>

          <div class="table-responsive">
            <table class="table task-table align-middle" id="taskTable">
              <thead>
                <tr id="taskTableHead"></tr>
              </thead>
              <tbody id="taskTableBody"></tbody>
            </table>
          </div>

          <div class="empty-state hidden" id="emptyState">
            No tasks found for this selection.
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script>
    const token = localStorage.getItem("authToken");
    const employeeRole = localStorage.getItem("employeeRole");

    if (!token) {
      window.location.href = "index.html";
    }

    const isAdmin = employeeRole === "ADMIN";
    const today = new Date().toLocaleDateString("en-CA", {
      timeZone: "Asia/Kolkata"
    });

    const form = document.getElementById("taskForm");
    const taskDateInput = document.getElementById("taskDate");
    const taskTitleInput = document.getElementById("taskTitle");
    const taskDescriptionInput = document.getElementById("taskDescription");
    const taskStatusInput = document.getElementById("taskStatus");
    const filterDateInput = document.getElementById("filterDate");
    const employeeFilter = document.getElementById("employeeFilter");
    const employeeFilterWrap = document.getElementById("employeeFilterWrap");
    const statusFilter = document.getElementById("statusFilter");
    const refreshBtn = document.getElementById("refreshBtn");
    const taskTableHead = document.getElementById("taskTableHead");
    const taskTableBody = document.getElementById("taskTableBody");
    const emptyState = document.getElementById("emptyState");
    const taskCountBadge = document.getElementById("taskCountBadge");
    const cancelEditBtn = document.getElementById("cancelEditBtn");
    const formTitle = document.getElementById("formTitle");
    const submitBtn = document.getElementById("submitBtn");
    const heroTitle = document.getElementById("heroTitle");
    const heroText = document.getElementById("heroText");
    const listTitle = document.getElementById("listTitle");
    const listDescription = document.getElementById("listDescription");
    const taskFormColumn = document.getElementById("taskFormColumn");

    let editingTaskId = null;

    taskDateInput.value = today;
    filterDateInput.value = today;

    if (isAdmin) {
      heroTitle.textContent = "Team Daily Tasks";
      heroText.textContent = "Review all employees' tasks for the day, filter by employee or status, and keep a clear view of what is pending, blocked, or complete.";
      listTitle.textContent = "Team Task List";
      listDescription.textContent = "Use the filters to review the full team's daily task updates.";
      employeeFilterWrap.classList.remove("hidden");
      taskFormColumn.classList.add("hidden");
    }

    function escapeHtml(value) {
      return (value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function renderTableHead() {
      const headers = isAdmin
        ? ["Employee", "Date", "Task", "Description", "Status", "Updated"]
        : ["Date", "Task", "Description", "Status", "Updated", "Action"];

      taskTableHead.innerHTML = headers.map(header => `<th>${header}</th>`).join("");
    }

    function setTaskCount(count) {
      taskCountBadge.textContent = `${count} task${count === 1 ? "" : "s"}`;
    }

    function formatDate(dateValue) {
      return new Date(`${dateValue}T00:00:00`).toLocaleDateString("en-IN", {
        day: "2-digit",
        month: "short",
        year: "numeric"
      });
    }

    function formatDateTime(dateValue) {
      if (!dateValue) return "—";
      return new Date(dateValue).toLocaleString("en-IN", {
        timeZone: "Asia/Kolkata",
        day: "2-digit",
        month: "short",
        hour: "2-digit",
        minute: "2-digit",
        hour12: true
      });
    }

    function getStatusClass(status) {
      return status.replace(/\s+/g, "-");
    }

    function resetForm() {
      editingTaskId = null;
      form.reset();
      taskDateInput.value = filterDateInput.value || today;
      taskStatusInput.value = "Pending";
      formTitle.textContent = "Add Daily Task";
      submitBtn.textContent = "Save Task";
      cancelEditBtn.classList.add("hidden");
    }

    function fillFormForEdit(task) {
      editingTaskId = task.id;
      taskDateInput.value = task.task_date;
      taskTitleInput.value = task.task_title;
      taskDescriptionInput.value = task.task_description || "";
      taskStatusInput.value = task.status;
      formTitle.textContent = "Update Task";
      submitBtn.textContent = "Update Task";
      cancelEditBtn.classList.remove("hidden");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    async function fetchJson(url, options = {}) {
      const res = await fetch(url, {
        ...options,
        headers: {
          "Content-Type": "application/json",
          Authorization: "Bearer " + token,
          ...(options.headers || {})
        }
      });

      const result = await res.json();
      if (!res.ok || !result.success) {
        throw new Error(result.message || "Request failed");
      }

      return result;
    }

    async function loadEmployeeOptions() {
      if (!isAdmin) return;

      const result = await fetchJson(`${API_BASE_URL}/api/admin/employees`, {
        headers: {
          "Content-Type": "application/json"
        }
      });

      employeeFilter.innerHTML = `<option value="">All Employees</option>`;
      result.data.forEach(employee => {
        employeeFilter.innerHTML += `
          <option value="${employee.id}">
            ${escapeHtml(employee.name)}${employee.employee_code ? ` (${escapeHtml(employee.employee_code)})` : ""}
          </option>
        `;
      });
    }

    function renderRows(tasks) {
      if (!tasks.length) {
        taskTableBody.innerHTML = "";
        emptyState.textContent = "No tasks found for this selection.";
        emptyState.classList.remove("hidden");
        setTaskCount(0);
        return;
      }

      emptyState.classList.add("hidden");
      emptyState.textContent = "No tasks found for this selection.";
      setTaskCount(tasks.length);

      taskTableBody.innerHTML = tasks.map(task => {
        const statusBadge = `<span class="task-status ${getStatusClass(task.status)}">${escapeHtml(task.status)}</span>`;

        if (isAdmin) {
          const employee = task.employees || {};
          const employeeText = `${employee.name || "Unknown"}${employee.employee_code ? ` (${employee.employee_code})` : ""}`;
          return `
            <tr>
              <td>${escapeHtml(employeeText)}</td>
              <td>${formatDate(task.task_date)}</td>
              <td>${escapeHtml(task.task_title)}</td>
              <td>${escapeHtml(task.task_description || "—")}</td>
              <td>${statusBadge}</td>
              <td>${formatDateTime(task.updated_at || task.created_at)}</td>
            </tr>
          `;
        }

        return `
          <tr>
            <td>${formatDate(task.task_date)}</td>
            <td>${escapeHtml(task.task_title)}</td>
            <td>${escapeHtml(task.task_description || "—")}</td>
            <td>${statusBadge}</td>
            <td>${formatDateTime(task.updated_at || task.created_at)}</td>
            <td>
              <button class="btn btn-sm btn-outline-primary edit-task-btn" data-task-id="${task.id}">
                Edit
              </button>
            </td>
          </tr>
        `;
      }).join("");

      if (!isAdmin) {
        document.querySelectorAll(".edit-task-btn").forEach(button => {
          button.addEventListener("click", () => {
            const task = tasks.find(item => item.id === button.dataset.taskId);
            if (task) {
              fillFormForEdit(task);
            }
          });
        });
      }
    }

    async function loadTasks() {
      try {
        const date = filterDateInput.value || today;
        const status = statusFilter.value;

        let url = "";
        if (isAdmin) {
          const params = new URLSearchParams({ date });
          if (status) params.set("status", status);
          if (employeeFilter.value) params.set("employee_id", employeeFilter.value);
          url = `${API_BASE_URL}/api/tasks/admin?${params.toString()}`;
        } else {
          url = `${API_BASE_URL}/api/tasks/my?date=${encodeURIComponent(date)}`;
        }

        const result = await fetchJson(url, {
          headers: {
            "Content-Type": "application/json"
          }
        });

        let tasks = result.data || [];
        if (!isAdmin && status) {
          tasks = tasks.filter(task => task.status === status);
        }

        renderRows(tasks);
      } catch (err) {
        console.error(err);
        taskTableBody.innerHTML = "";
        emptyState.classList.remove("hidden");
        emptyState.textContent = err.message || "Unable to load tasks.";
        setTaskCount(0);
      }
    }

    form.addEventListener("submit", async event => {
      event.preventDefault();

      const payload = {
        task_date: taskDateInput.value,
        task_title: taskTitleInput.value.trim(),
        task_description: taskDescriptionInput.value.trim(),
        status: taskStatusInput.value
      };

      if (!payload.task_title) {
        alert("Task title is required");
        return;
      }

      submitBtn.disabled = true;

      try {
        if (editingTaskId) {
          await fetchJson(`${API_BASE_URL}/api/tasks/${editingTaskId}`, {
            method: "PUT",
            body: JSON.stringify(payload)
          });
          alert("Task updated successfully");
        } else {
          await fetchJson(`${API_BASE_URL}/api/tasks`, {
            method: "POST",
            body: JSON.stringify(payload)
          });
          alert("Task created successfully");
        }

        filterDateInput.value = payload.task_date;
        resetForm();
        await loadTasks();
      } catch (err) {
        console.error(err);
        alert(err.message || "Unable to save task");
      } finally {
        submitBtn.disabled = false;
      }
    });

    cancelEditBtn.addEventListener("click", resetForm);
    refreshBtn.addEventListener("click", loadTasks);
    filterDateInput.addEventListener("change", () => {
      if (!isAdmin) {
        taskDateInput.value = filterDateInput.value;
      }
      loadTasks();
    });
    statusFilter.addEventListener("change", loadTasks);
    employeeFilter.addEventListener("change", loadTasks);

    renderTableHead();
    resetForm();

    (async function init() {
      try {
        await loadEmployeeOptions();
      } catch (err) {
        console.error(err);
      }
      await loadTasks();
    })();
  </script>
</body>
</html>
